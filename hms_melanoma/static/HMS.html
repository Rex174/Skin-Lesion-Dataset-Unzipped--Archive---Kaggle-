<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MelanoScan HMS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      /* Set by theme JS; these are fallbacks */
      --primary:       oklch(62% 0.16 35);
      --primary-dark:  oklch(48% 0.16 35);
      --primary-light: oklch(94% 0.06 35);
      --secondary:     oklch(58% 0.14 190);
      --accent:        oklch(72% 0.16 75);
      --info:          oklch(58% 0.16 240);
      --info-bg:       oklch(94% 0.05 240);

      --bg:            oklch(97% 0.012 60);
      --surface:       #ffffff;
      --surface-2:     oklch(96% 0.010 55);
      --border:        oklch(90% 0.012 55);
      --text:          oklch(18% 0.015 50);
      --text-muted:    oklch(52% 0.012 50);
      --text-light:    oklch(70% 0.008 50);

      --success:       oklch(56% 0.18 145);
      --success-bg:    oklch(94% 0.05 145);
      --danger:        oklch(55% 0.22 20);
      --danger-bg:     oklch(95% 0.05 20);
      --warning:       oklch(66% 0.18 75);
      --warning-bg:    oklch(94% 0.06 75);

      --sidebar-width: 238px;
      --topbar-height: 60px;
      --radius:        12px;
      --radius-sm:     8px;
      --radius-lg:     16px;
      --shadow:        0 1px 3px rgba(0,0,0,0.07), 0 1px 2px rgba(0,0,0,0.04);
      --shadow-md:     0 4px 14px rgba(0,0,0,0.08), 0 2px 4px rgba(0,0,0,0.04);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body, #root {
      height: 100%; width: 100%; overflow: hidden;
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    /* Scrollbars */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

    button, input, select, textarea {
      font-family: 'Plus Jakarta Sans', sans-serif;
    }

    /* Smooth hover for nav buttons */
    nav button { transition: background 0.15s, color 0.15s; }
    table tr   { transition: background 0.1s; }
    table tbody tr:hover { background: var(--surface-2); }
  </style>

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js"
    integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
    crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
    integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
    crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
    integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
    crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="/static/hms_icons.jsx"></script>
  <script type="text/babel" src="/static/hms_data.jsx"></script>
  <script type="text/babel" src="/static/hms_live.jsx"></script>
  <script type="text/babel" src="/static/hms_ui.jsx"></script>
  <script type="text/babel" src="/static/hms_doctor.jsx"></script>
  <script type="text/babel" src="/static/hms_patient.jsx"></script>
  <script type="text/babel" src="/static/hms_app.jsx"></script>
</body>
</html>
